# Netlify configuration for 7-Day Organic Vegan Detox & Cleanse app
# Deploy this directory (detox-app/) as the Netlify site root

[build]
  publish   = "."            # static files are in this directory
  functions = "netlify/functions"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# Never cache .env files (they should not be deployed, but belt-and-suspenders)
[[headers]]
  for = "/.env*"
  [headers.values]
    Cache-Control = "no-store"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Fix 7: MIME types for Office and PDF files so browsers open/download correctly
[[headers]]
  for = "/*.docx"
  [headers.values]
    Content-Type        = "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
    Content-Disposition = "attachment"

[[headers]]
  for = "/*.xlsx"
  [headers.values]
    Content-Type        = "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
    Content-Disposition = "attachment"

[[headers]]
  for = "/*.pdf"
  [headers.values]
    Content-Type = "application/pdf"
